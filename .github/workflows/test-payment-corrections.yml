name: Test Payment Corrections

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  payment-corrections:
    name: Payment corrections
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run payment corrections check
        run: npm run test:payment-corrections
