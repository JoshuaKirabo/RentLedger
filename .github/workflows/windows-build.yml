name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Bundle Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify bundled database is present
        run: |
          if (-not (Test-Path data/kimujjo_holdings_database.db)) {
            throw "Missing data/kimujjo_holdings_database.db. Commit the real bundled database before building."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: rent-ledger-windows
          path: |
            dist/**/*.exe
            dist/**/*.blockmap
            dist/**/*.yml
          if-no-files-found: error
